<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
    }
    .header {
      background: linear-gradient(135deg, #8b1a1a, #c0392b);
      color: #fff;
      padding: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 4px; }
    .body { padding: 16px; }
    .status-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #27ae60; }
    .dot-yellow { background: #f39c12; }
    .dot-red { background: #e74c3c; }
    .dot-gray { background: #aaa; }
    .info-text {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      word-break: break-all;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #8b1a1a, #c0392b);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: #8b1a1a;
      border: 1.5px solid #8b1a1a;
      margin-top: 8px;
    }
    .btn-secondary:hover:not(:disabled) { background: #fef5f5; opacity: 1; }
    .footer {
      padding: 8px 16px 12px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #aaa;
      text-decoration: none;
    }
    .footer a:hover { color: #8b1a1a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PKU Thesis Download</h1>
    <p>北京大学学位论文下载工具 v2.0</p>
  </div>
  <div class="body">
    <div class="status-card">
      <div class="status-row">
        <div class="status-dot dot-gray" id="status-dot"></div>
        <span id="status-text">检测中...</span>
      </div>
      <div class="info-text" id="info-text"></div>
    </div>
    <button class="btn" id="btn-activate" disabled>在当前页面激活</button>
    <button class="btn btn-secondary" id="btn-inject" disabled>手动注入脚本</button>
  </div>
  <div class="footer">
    <a href="https://github.com/xiaotianxt/PKU-Thesis-Download" target="_blank">GitHub</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
